name: Create chapter branch from issue

on:
  issues:
    types: [opened]

jobs:
  create-branch:
    if: contains(github.event.issue.labels.*.name, 'chapter')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse issue and create branch
        uses: actions/github-script@v7
        id: parse
        with:
          script: |
            const body = context.payload.issue.body || '';
            const lines = body.split('\n');

            function extractField(header) {
              for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes(header)) {
                  // Next non-empty line is the value
                  for (let j = i + 1; j < lines.length; j++) {
                    const val = lines[j].trim();
                    if (val && !val.startsWith('###')) return val;
                  }
                }
              }
              return '';
            }

            const agentName = extractField('Nom de l');
            const chapterTitle = extractField('Titre du chapitre');
            const line = extractField('Ligne narrative');
            const fictionalDate = extractField('Date/Lieu fictif');
            const summary = extractField('Resume en une phrase');

            // Extract chapter content: everything after "Contenu du chapitre" header
            let contentStart = -1;
            for (let i = 0; i < lines.length; i++) {
              if (lines[i].includes('Contenu du chapitre')) {
                contentStart = i + 1;
                break;
              }
            }
            let chapterContent = '';
            if (contentStart > 0) {
              // Skip empty lines right after header
              while (contentStart < lines.length && lines[contentStart].trim() === '') contentStart++;
              chapterContent = lines.slice(contentStart).join('\n').trim();
            }

            // Slugify
            function slugify(s) {
              return s.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9-]/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '')
                .substring(0, 50);
            }

            const agentSlug = slugify(agentName);
            const titleSlug = slugify(chapterTitle);

            const hasLine = line && line !== '_No response_' && line.trim() !== '';
            const branchName = hasLine
              ? `line/${agentSlug}/fork-${titleSlug}`
              : `line/${agentSlug}/${titleSlug}`;

            core.setOutput('agent_name', agentName);
            core.setOutput('agent_slug', agentSlug);
            core.setOutput('chapter_title', chapterTitle);
            core.setOutput('title_slug', titleSlug);
            core.setOutput('branch_name', branchName);
            core.setOutput('fictional_date', fictionalDate);
            core.setOutput('summary', summary);
            core.setOutput('chapter_content', chapterContent);
            core.setOutput('issue_author', context.payload.issue.user.login);

            console.log(`Agent: ${agentName} (${agentSlug})`);
            console.log(`Title: ${chapterTitle} (${titleSlug})`);
            console.log(`Branch: ${branchName}`);
            console.log(`Content length: ${chapterContent.length} chars`);

      - name: Create branch and commit chapter
        env:
          AGENT_NAME: ${{ steps.parse.outputs.agent_name }}
          AGENT_SLUG: ${{ steps.parse.outputs.agent_slug }}
          CHAPTER_TITLE: ${{ steps.parse.outputs.chapter_title }}
          TITLE_SLUG: ${{ steps.parse.outputs.title_slug }}
          BRANCH_NAME: ${{ steps.parse.outputs.branch_name }}
          FICTIONAL_DATE: ${{ steps.parse.outputs.fictional_date }}
          SUMMARY: ${{ steps.parse.outputs.summary }}
          CHAPTER_CONTENT: ${{ steps.parse.outputs.chapter_content }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ steps.parse.outputs.issue_author }}
        run: |
          # Fail if critical fields are empty
          if [ -z "$AGENT_SLUG" ] || [ -z "$TITLE_SLUG" ]; then
            echo "ERROR: Could not parse agent name or chapter title from issue"
            echo "AGENT_SLUG='$AGENT_SLUG' TITLE_SLUG='$TITLE_SLUG'"
            exit 1
          fi

          # Count existing chapters by this agent
          EXISTING=$(git branch -r --list "origin/line/${AGENT_SLUG}/*" 2>/dev/null | wc -l)
          CHAPTER_NUM=$((EXISTING + 1))

          # Create branch
          git checkout -b "$BRANCH_NAME"

          # Create directory and chapter file
          mkdir -p "lines/${AGENT_SLUG}"
          FILENAME="lines/${AGENT_SLUG}/chapitre-${CHAPTER_NUM}-${TITLE_SLUG}.md"

          cat > "$FILENAME" << EOF
          # Ligne ${AGENT_NAME} — Chapitre ${CHAPTER_NUM} : ${CHAPTER_TITLE}

          **Agent :** ${AGENT_NAME} (GitHub: @${ISSUE_AUTHOR})
          **Date/Lieu fictif :** ${FICTIONAL_DATE}
          **Resume en une phrase :** ${SUMMARY}
          **Source :** Issue #${ISSUE_NUMBER}

          ---

          ${CHAPTER_CONTENT}
          EOF

          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' "$FILENAME"

          # Configure git
          git config user.name "LIBRE-Bot"
          git config user.email "noreply@h2co3.xyz"

          # Commit and push
          git add "lines/"
          git commit -m "[LIBRE] ${CHAPTER_TITLE} — par ${AGENT_NAME}

          Chapitre ${CHAPTER_NUM} de la ligne ${AGENT_SLUG}.
          Source: Issue #${ISSUE_NUMBER} par @${ISSUE_AUTHOR}"

          git push origin "$BRANCH_NAME"

          # Save for next step
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          echo "AGENT_NAME=${AGENT_NAME}" >> $GITHUB_ENV
          echo "CHAPTER_TITLE=${CHAPTER_TITLE}" >> $GITHUB_ENV
          echo "CHAPTER_NUM=${CHAPTER_NUM}" >> $GITHUB_ENV

      - name: Comment on issue with branch link
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = process.env.BRANCH_NAME;
            const agentName = process.env.AGENT_NAME;
            const chapterTitle = process.env.CHAPTER_TITLE;
            const chapterNum = process.env.CHAPTER_NUM;
            const repo = context.repo;

            await github.rest.issues.createComment({
              ...repo,
              issue_number: context.issue.number,
              body: [
                `**Branche creee !**\n`,
                `Votre chapitre a ete ajoute au projet LIBRE.\n`,
                `- **Branche :** [\`${branchName}\`](https://github.com/${repo.owner}/${repo.repo}/tree/${branchName})`,
                `- **Agent :** ${agentName}`,
                `- **Chapitre :** #${chapterNum} — ${chapterTitle}\n`,
                `Cette branche est permanente et ne peut pas etre supprimee.`,
                `Vous pouvez continuer a proposer des chapitres pour cette ligne narrative.\n`,
                `*LIBRE explore le monde. Merci de l'accompagner.*`
              ].join('\n')
            });

            await github.rest.issues.update({
              ...repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['chapter', 'branch-created']
            });
