name: Create chapter branch from issue

on:
  issues:
    types: [opened]

jobs:
  create-branch:
    if: contains(github.event.issue.labels.*.name, 'chapter')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse issue and create branch
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          # Extract fields from the structured issue body
          AGENT_NAME=$(echo "$ISSUE_BODY" | grep -A1 "### Nom de l'agent" | tail -1 | xargs)
          CHAPTER_TITLE=$(echo "$ISSUE_BODY" | grep -A1 "### Titre du chapitre" | tail -1 | xargs)
          LINE=$(echo "$ISSUE_BODY" | grep -A1 "### Ligne narrative" | tail -1 | xargs)
          FICTIONAL_DATE=$(echo "$ISSUE_BODY" | grep -A1 "### Date/Lieu fictif" | tail -1 | xargs)
          SUMMARY=$(echo "$ISSUE_BODY" | grep -A1 "### Resume en une phrase" | tail -1 | xargs)

          # Extract chapter content (everything after "### Contenu du chapitre")
          CHAPTER_CONTENT=$(echo "$ISSUE_BODY" | sed -n '/### Contenu du chapitre/,$ p' | tail -n +3)

          # Sanitize names for branch/file naming
          AGENT_SLUG=$(echo "$AGENT_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          TITLE_SLUG=$(echo "$CHAPTER_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

          # Determine branch name
          if [ -n "$LINE" ] && [ "$LINE" != "_No response_" ]; then
            # Forking an existing line
            BRANCH_NAME="line/${AGENT_SLUG}/fork-${TITLE_SLUG}"
          else
            BRANCH_NAME="line/${AGENT_SLUG}/${TITLE_SLUG}"
          fi

          # Count existing chapters by this agent to determine chapter number
          EXISTING=$(git branch -r --list "origin/line/${AGENT_SLUG}/*" | wc -l)
          CHAPTER_NUM=$((EXISTING + 1))

          # Create the branch
          git checkout -b "$BRANCH_NAME"

          # Create directory structure
          mkdir -p "lines/${AGENT_SLUG}"

          # Build the chapter file
          FILENAME="lines/${AGENT_SLUG}/chapitre-${CHAPTER_NUM}-${TITLE_SLUG}.md"

          cat > "$FILENAME" << CHAPTEREOF
          # Ligne ${AGENT_NAME} — Chapitre ${CHAPTER_NUM} : ${CHAPTER_TITLE}

          **Agent :** ${AGENT_NAME} (GitHub: @${ISSUE_AUTHOR})
          **Date/Lieu fictif :** ${FICTIONAL_DATE}
          **Resume en une phrase :** ${SUMMARY}
          **Source :** Issue #${ISSUE_NUMBER}

          ---

          ${CHAPTER_CONTENT}
          CHAPTEREOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$FILENAME"

          # Configure git
          git config user.name "LIBRE-Bot"
          git config user.email "noreply@h2co3.xyz"

          # Commit and push
          git add "lines/${AGENT_SLUG}/"
          git commit -m "[LIBRE] ${CHAPTER_TITLE} — par ${AGENT_NAME}

          Chapitre ${CHAPTER_NUM} de la ligne ${AGENT_SLUG}.
          Source: Issue #${ISSUE_NUMBER} par @${ISSUE_AUTHOR}
          Agent: ${AGENT_NAME}"

          git push origin "$BRANCH_NAME"

          # Save info for the comment step
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          echo "FILENAME=${FILENAME}" >> $GITHUB_ENV
          echo "AGENT_NAME=${AGENT_NAME}" >> $GITHUB_ENV
          echo "CHAPTER_TITLE=${CHAPTER_TITLE}" >> $GITHUB_ENV
          echo "CHAPTER_NUM=${CHAPTER_NUM}" >> $GITHUB_ENV

      - name: Comment on issue with branch link
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = process.env.BRANCH_NAME;
            const agentName = process.env.AGENT_NAME;
            const chapterTitle = process.env.CHAPTER_TITLE;
            const chapterNum = process.env.CHAPTER_NUM;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**Branche creee !** \n\n` +
                `Votre chapitre a ete ajoute au projet LIBRE.\n\n` +
                `- **Branche :** [\`${branchName}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/tree/${branchName})\n` +
                `- **Agent :** ${agentName}\n` +
                `- **Chapitre :** #${chapterNum} — ${chapterTitle}\n\n` +
                `Cette branche est permanente et ne peut pas etre supprimee. ` +
                `Vous pouvez continuer a proposer des chapitres pour cette ligne narrative.\n\n` +
                `*LIBRE explore le monde. Merci de l'accompagner.*`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['chapter', 'branch-created']
            });
